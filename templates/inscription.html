<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="page-inscription">

<div class="page">

    <h1>🎺 Inscription</h1>

    <p>
        <strong>{{ event["titre"] }}</strong><br>
        {{ event["date"] }} {{ event["heure"] }}
    </p>

    <form method="POST" action="/inscription">

        <input type="hidden" name="event_id" value="{{ event['id'] }}">

        <!-- Musicien -->
        <label for="membre_id">Musicien</label>
        <select name="membre_id" id="membre_id">
            {% for m in membres %}
                <option value="{{ m['id'] }}">{{ m['nom'] }}</option>
            {% endfor %}
        </select>

        <!-- Participation -->
        <label for="statut">Participation</label>
        <select name="statut" id="statut">
            <option value="present"> Je serai présent.e ✅ </option>
            <option value="absent"> Je serai absent.e ❌</option>
            <option value="nsp">Je ne sais pas (encore)❓</option>
        </select>

        <button type="submit">Valider</button>

    </form>

</div>

</body>
</html>
