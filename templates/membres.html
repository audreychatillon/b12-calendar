<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Membres</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
</head>

<body>

<header class="site-header">

    <h1 class="site-title">
        <span class="material-symbols-outlined logo-yellow">
            groups
        </span>
        Membres
    </h1>

    <img src="{{ url_for('static', filename='img/logo_b12.png') }}"
         class="logo"
         alt="B12">

</header>

<div class="members-list">
	{% for m in membres %}
        <form method="POST" action="/membres/update/{{ m['id'] }}" class="member-line">

            <span class="member-name">{{ m['nom'] }}</span>

            <input type="text"
                   name="instruments"
                   value="{{ m['instruments'] }}"
                   placeholder="Instruments">

            <button type="submit" class="btn-save">
                <span class="material-symbols-outlined">save</span>
            </button>

        </form>

	{% endfor %}
</div>
    <br>
    <a href="/">← Retour au calendrier</a>
</body>
</html>
